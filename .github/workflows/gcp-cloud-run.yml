name: GCP Cloud Run Deploy (Scenario B)
# Force trigger: 2026-07-04 v2

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/**'
      - 'argocd/**'
      - 'docs/**'
      - 'README.md'
      - '.gitignore'

concurrency:
  group: gcp-cloud-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Compiler Check (Typecheck)
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm run test

  build-and-deploy:
    needs: test-and-typecheck
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Google Cloud 인증 (Service Account Key 사용)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # 2. Artifact Registry 로그인
      - name: Configure Docker to use Artifact Registry
        run: |
          gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      # 3. Buildx 설정 (GHA 캐싱 작동을 위해 필수)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/wyd-2027-kr-segok-mgmt:${{ github.sha }}
            asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/wyd-2027-kr-segok-mgmt:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Detect database setup changes
        id: db_changes
        shell: bash
        run: |
          BASE="${{ github.event.before }}"
          if [[ -z "$BASE" || "$BASE" =~ ^0+$ ]]; then
            BASE="HEAD~1"
          fi
          CHANGED_FILES="$(git diff --name-only "$BASE" "${{ github.sha }}" || true)"
          echo "$CHANGED_FILES"
          if echo "$CHANGED_FILES" | grep -Eq '^(server/src/db/|server/src/db\.ts|scripts/setup-db\.mjs|package-lock\.json|package\.json)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # 4. Cloud Run Job 실행하여 DB 마이그레이션 및 시딩 (선택사항)
      # 환경변수나 Cloud SQL 커넥션이 설정된 Job이 미리 GCP 상에 존재해야 작동합니다.
      - name: Run Database Migration Job
        if: steps.db_changes.outputs.changed == 'true'
        run: |
          # 기존 wyh-db-setup Job의 컨테이너 이미지를 최신으로 교체 후 실행
          gcloud run jobs update wyh-db-setup \
            --image asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/wyd-2027-kr-segok-mgmt:${{ github.sha }} \
            --region asia-northeast3 --quiet
          
          gcloud run jobs execute wyh-db-setup --region asia-northeast3 --wait

      # 5. Cloud Run Service에 신규 이미지 배포 (기존 환경변수/연결 유지)
      - name: Deploy to GCP Cloud Run
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "Cloud Run deploy attempt ${attempt}/3"
            if gcloud run deploy wyd-2027-kr-segok-mgmt \
              --image asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/wyd-2027-kr-segok-mgmt:${{ github.sha }} \
              --region asia-northeast3 \
              --min-instances 0 \
              --max-instances 3 \
              --concurrency 50 \
              --cpu 1 \
              --memory 512Mi \
              --timeout 30s \
              --update-env-vars "^|^MAX_CONCURRENT_REQUESTS=120|RATE_LIMIT_WINDOW_MS=60000|RATE_LIMIT_MAX=120|USER_SESSION_MINUTES=5|ADMIN_SESSION_MINUTES=5|TRUST_PROXY=1|ALLOWED_ORIGINS=https://segokwyd.kr,https://www.segokwyd.kr,https://sgwyd2027.kr,https://www.sgwyd2027.kr,https://wyd-2027-kr-segok-mgmt-yftakontba-du.a.run.app|PUBLIC_CUSTOM_ORIGINS=https://segokwyd.kr,https://www.segokwyd.kr,https://sgwyd2027.kr,https://www.sgwyd2027.kr" \
              --quiet; then
              exit 0
            fi
            sleep 30
          done
          exit 1
