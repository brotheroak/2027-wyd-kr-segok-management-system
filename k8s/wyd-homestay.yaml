apiVersion: v1
kind: Namespace
metadata:
  name: wyd-homestay
apiVersion: v1
kind: ConfigMap
metadata:
  name: wyd-homestay-config
  namespace: wyd-homestay
data:
  NODE_ENV: "production"
  PORT: "4177"
  DATABASE_SSL: "true"
  DATA_DIR: "/app/data"
  MAX_CONCURRENT_REQUESTS: "500"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX: "240"
  TRUST_PROXY: "1"
  ALLOWED_ORIGINS: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wyd-homestay-data
  namespace: wyd-homestay
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wyd-homestay
  namespace: wyd-homestay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wyd-homestay
  template:
    metadata:
      labels:
        app: wyd-homestay
    spec:
      nodeSelector:
        role: app
      securityContext:
        fsGroup: 1000
      containers:
        - name: app
          image: ghcr.io/your-org/wyd-homestay-system:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4177
          envFrom:
            - configMapRef:
                name: wyd-homestay-config
            - secretRef:
                name: wyd-homestay-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wyd-homestay-data
---
apiVersion: v1
kind: Service
metadata:
  name: wyd-homestay
  namespace: wyd-homestay
spec:
  type: ClusterIP
  selector:
    app: wyd-homestay
  ports:
    - name: http
      port: 80
      targetPort: http
