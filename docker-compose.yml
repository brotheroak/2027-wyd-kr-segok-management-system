services:
  wyd-homestay:
    build:
      context: .
    image: wyd-homestay-system:local
    restart: unless-stopped
    ports:
      - "${PORT:-4177}:4177"
    environment:
      NODE_ENV: production
      PORT: 4177
      DATA_DIR: /app/data
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:?set DATA_ENCRYPTION_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      MAX_CONCURRENT_REQUESTS: ${MAX_CONCURRENT_REQUESTS:-500}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-240}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMS_WEBHOOK_URL: ${SMS_WEBHOOK_URL:-}
      SMS_WEBHOOK_TOKEN: ${SMS_WEBHOOK_TOKEN:-}
    volumes:
      - wyd-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4177/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s

volumes:
  wyd-data:
